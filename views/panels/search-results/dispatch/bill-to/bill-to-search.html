<div class="panel stacked not-stacked" id="panel-dispatch-bill-to-search-result">
    <div class="panel-content">
        <div class="panel-close-btn">
            <i class="fas fa-times"></i>
        </div>
        <div class="mochi-header">
            <div class="mochi-header-content">
                Bill-To Search Results
            </div>
        </div>

        <div class="search-container">
            <div class="input-box-container search-filter">
                <div class="filter-words">
                    [FILTER]                    
                </div>
                <label for="txt-bill-to-hidden">Search Filter</label>
            </div>

            <div class="tbl-dispatch-bill-to-search-results" id="tbl-dispatch-bill-to-search-results">
                <div class="thead">
                    <div class="trow">
                        <div class="tcol customer-id hidden">Id</div>
                        <div class="tcol code">Code</div>
                        <div class="tcol name">Name</div>
                        <div class="tcol address1">Address 1</div>
                        <div class="tcol address2">Address 2</div>
                        <div class="tcol city">City</div>
                        <div class="tcol state">State</div>
                        <div class="tcol zip">Postal Code</div>
                        <div class="tcol contact-name">Contact Name</div>
                        <div class="tcol contact-phone">Contact Phone</div>
                        <div class="tcol ext">Ext</div>
                    </div>
                </div>
                <div class="tbody">
                    <div class="wrapper">
                        [RESULTS]
                    </div>
                </div>
            </div>
        </div>

        <div class="drag-handler"> </div>
        <div class="panel-not-focused"> </div>
        <div class="panel-selection-handler"> </div>
    </div>
</div>
