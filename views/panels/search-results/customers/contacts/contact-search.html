<div class="panel stacked not-stacked" id="panel-customers-contact-search-result">
    <div class="panel-content">
        <div class="panel-close-btn">
            <i class="fas fa-times"></i>
        </div>
        <div class="mochi-header">
            <div class="mochi-header-content">
                Contact Search Results
            </div>
        </div>

        <div class="search-container">
            <div class="input-box-container search-filter">
                <div class="filter-words">
                    [FILTER]                    
                </div>
                <label for="txt-contact-hidden">Search Filter</label>
            </div>

            <div class="tbl-customers-contact-search-results" id="tbl-customers-contact-search-results">
                <div class="thead">
                    <div class="trow">
                        <div class="tcol contact-id hidden">Id</div>
                        <div class="tcol contact-first-name">First Name</div>
                        <div class="tcol contact-last-name">Last Name</div>
                        <div class="tcol contact-address1">Address 1</div>
                        <div class="tcol contact-address2">Address 2</div>
                        <div class="tcol contact-city">City</div>
                        <div class="tcol contact-state">State</div>
                        <div class="tcol contact-phone-work">Phone Work</div>
                        <div class="tcol contact-email-work">E-mail Work</div>
                    </div>
                </div>
                <div class="tbody">
                    <div class="wrapper">
                        [RESULTS]
                    </div>
                </div>
            </div>
        </div>

        <div class="drag-handler"> </div>
        <div class="panel-not-focused"> </div>
        <div class="panel-selection-handler"> </div>
    </div>
</div>
