<div class="panel stacked not-stacked" id="panel-carrier-docs">
    <div class="panel-content">
        <div class="panel-close-btn">
            <i class="fas fa-times"></i>
        </div>
        <div class="mochi-header">
            <div class="mochi-header-content">
                Documents
            </div>
        </div>
        <div class="header">
            <div class="input-fields-section">
                <div class="row-fields">
                    <div class="input-box-container hidden">
                        <input required type="text" id="txt-slide-carrier-docs-id" name="txt-slide-carrier-docs-id">
                    </div>
                    <div class="input-box-container medium-size">
                        <input required type="text" id="txt-slide-carrier-docs-user-id"
                            name="txt-slide-carrier-docs-user-id" title="User ID" value="[USER-ID]" disabled>
                        <!-- <label for="txt-slide-carrier-docs-user-id">User ID</label> -->
                    </div>
                    <div class="separator"></div>
                    <div class="input-box-container medium-size">
                        <input required type="text" id="txt-slide-carrier-docs-date-entered"
                            name="txt-slide-carrier-docs-date-entered" title="Date Entered" value="[DATE-ENTERED]"
                            disabled>
                        <!-- <label for="txt-slide-carrier-docs-date-entered">Date Entered</label> -->
                    </div>
                    <div class="separator"></div>
                    <div class="mochi-button text-center" id="slide-carrier-docs-clear-btn">
                        <div class="mochi-button-decorator mochi-button-decorator-left">(</div>
                        <div class="mochi-button-base">
                            Clear
                        </div>
                        <div class="mochi-button-decorator mochi-button-decorator-right">)</div>
                    </div>
                </div>
                <div class="separator"></div>
                <div class="row-fields">
                    <div class="input-box-container fixed-size">
                        <input required type="text" id="txt-slide-carrier-docs-title"
                            name="txt-slide-carrier-docs-title" title="Title">
                        <label for="txt-slide-carrier-docs-title">Title</label>
                    </div>
                    <div class="separator"></div>
                    <div class="input-box-container fixed-size">
                        <input required type="text" id="txt-slide-carrier-docs-subject"
                            name="txt-slide-carrier-docs-subject" title="Subject">
                        <label for="txt-slide-carrier-docs-subject">Subject</label>
                    </div>
                    <div class="separator"></div>
                    <div class="input-box-container input-tag">                        
                        <input required type="text" id="txt-slide-carrier-docs-tags" name="txt-slide-carrier-docs-tags"
                            title="Tags" style="text-transform: lowercase;" placeholder="Tags">
                    </div>
                </div>
            </div>
            <div class="buttons-section">
                <div class="mochi-button text-center" id="slide-carrier-docs-search-documents-btn">
                    <div class="mochi-button-decorator mochi-button-decorator-left">(</div>
                    <div class="mochi-button-base">
                        Search Documents
                    </div>
                    <div class="mochi-button-decorator mochi-button-decorator-right">)</div>
                </div>
                <div class="mochi-button text-center" id="slide-carrier-docs-email-documents-btn">
                    <div class="mochi-button-decorator mochi-button-decorator-left">(</div>
                    <div class="mochi-button-base">
                        E-Mail Documents
                    </div>
                    <div class="mochi-button-decorator mochi-button-decorator-right">)</div>
                </div>
                <div class="mochi-button text-center" id="slide-carrier-docs-upload-documents-btn">
                    <div class="mochi-button-decorator mochi-button-decorator-left">(</div>
                    <div class="mochi-button-base">
                        Upload Documents
                    </div>
                    <div class="mochi-button-decorator mochi-button-decorator-right">)</div>
                </div>

                <form id="frm-document-upload-btn" style="display: none;" enctype="multipart/form-data">
                    <input type="file" name="avatar" id="select-document-input" accept="*">
                </form>
            </div>
        </div>

        <div class="row-content" style="margin: 10px 0 3px 0;">
            <div class="form-section" id="frm-carrier-docs-documents">
                <div class="top-border-section">
                    <div class="left-border"></div>
                    <div class="section-title">Documents</div>
                    <div class="middle-border"></div>
                    <div class="right-border"></div>
                </div>
                <div class="portal-container">
                    <div class="carrier-docs-documents-wrapper">
                        [DOCUMENTS-LIST]
                    </div>
                </div>
            </div>
            <div class="separator"></div>
            <div class="form-section" id="frm-carrier-docs-notes">
                <div class="top-border-section">
                    <div class="left-border"></div>
                    <div class="section-title">Notes</div>
                    <div class="middle-border"></div>
                    <div class="section-btn">
                        <div class="mochi-button" id="slide-carrier-docs-add-note-btn" style="align-items: center;">
                            <div class="mochi-button-decorator mochi-button-decorator-left">(</div>
                            <div class="mochi-button-base">
                                Add Note
                            </div>
                            <div class="mochi-button-decorator mochi-button-decorator-right">)</div>
                        </div>
                    </div>
                    <div class="right-border"></div>
                </div>

                <div class="portal-container">
                    <div class="carrier-docs-notes-wrapper">
                        
                    </div>
                </div>
            </div>
        </div>

        <div class="row-content growed">
            <div class="form-section" id="frm-carrier-docs-preview">
                <div class="top-border-section no-title">
                    <div class="left-border"></div>
                    <div class="section-title">Preview</div>
                    <div class="middle-border"></div>
                    <!-- <div class="section-btn">
                        <div class="mochi-button" id="slide-carrier-docs-preview-print-btn" style="align-items: center;">
                            <div class="mochi-button-decorator mochi-button-decorator-left">(</div>
                            <div class="mochi-button-base">
                                Print
                            </div>
                            <div class="mochi-button-decorator mochi-button-decorator-right">)</div>
                        </div>
                    </div> -->
                    <div class="right-border"></div>
                </div>
                <div class="portal-container">
                    <div class="portal-content" data-doc-id="">
                        <!-- <iframe id="pdf-js-viewer" src="http://localhost:8000/customer-documents/600e581e8f51a.png#toolbar=0&navpanes=0&scrollbar=0" title="webviewer" frameborder="0" allowfullscreen width="100%" height="100%" ></iframe>                         -->
                        <!-- <div class="img-wrapper">
                            <img src="http://localhost:8000/customer-documents/600e581e8f51a.png" alt="">
                        </div> -->


                    </div>
                </div>
            </div>
        </div>

        <div class="modal-customer-document-notes" data-id="0">
            <div class="modal-customer-document-notes-wrapper">
                <div class="modal-customer-document-notes-content">
                    <div class="row-textinput">
                        <textarea name="txt-customer-document-notes" id="txt-customer-document-notes"></textarea>
                    </div>
                    <div class="row-buttons">
                        <div class="mochi-button text-center" id="customer-document-notes-cancel-btn">
                            <div class="mochi-button-decorator mochi-button-decorator-left">(</div>
                            <div class="mochi-button-base">
                                Close
                            </div>
                            <div class="mochi-button-decorator mochi-button-decorator-right">)</div>
                        </div>

                        <div class="mochi-button text-center" id="customer-document-notes-save-btn">
                            <div class="mochi-button-decorator mochi-button-decorator-left">(</div>
                            <div class="mochi-button-base">
                                Save
                            </div>
                            <div class="mochi-button-decorator mochi-button-decorator-right">)</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="drag-handler"> </div>
        <div class="panel-not-focused"> </div>
        <div class="panel-selection-handler"> </div>
    </div>
</div>
